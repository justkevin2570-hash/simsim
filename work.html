<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 자동화 | 수학 교사는 심심했다</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #1b1408 0%, #2d2210 35%, #3d2e16 70%, #1a1206 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            padding: 60px 28px 80px;
            color: #e8ddd0;
        }

        /* ── 뒤로 가기 (좌측 상단) ── */
        .back-to-main {
            position: fixed;
            top: 24px;
            left: 24px;
            color: rgba(255,255,255,0.35);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
            z-index: 100;
        }
        .back-to-main:hover { color: rgba(255,255,255,0.7); }

        /* ── 헤더 ── */
        .header {
            text-align: center;
            margin-bottom: 64px;
        }

        .header h1 {
            font-size: 2.3rem;
            font-weight: 700;
            color: #f5edd8;
            letter-spacing: -0.4px;
        }

        .header .subtitle {
            color: rgba(245,237,216,0.38);
            font-size: 0.95rem;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* ── 카드 목록 ── */
        .site-list {
            display: flex;
            flex-direction: column;
            gap: 32px;
            width: 100%;
            max-width: 680px;
        }

        /* ── 카드 ── */
        .site-card {
            background: rgba(255,255,255,0.055);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 18px;
            padding: 36px 34px 32px;
            transition: all 0.28s ease;
            position: relative;
            overflow: hidden;
        }

        .site-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #f59e0b, #e8c840, #fbbf24);
            opacity: 0.7;
            border-radius: 18px 18px 0 0;
        }

        .site-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        }

        /* ── 카드 헤더 ── */
        .card-top {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 22px;
        }

        .card-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .card-icon.amber  { background: rgba(251,191,36,0.16);  color: #fbbf24; }
        .card-icon.orange { background: rgba(251,146,60,0.16);  color: #fb923c; }
        .card-icon.yellow { background: rgba(250,204,21,0.16);  color: #facc15; }

        .card-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #f5edd8;
            letter-spacing: -0.2px;
        }

        .card-tagline {
            font-size: 0.85rem;
            color: rgba(232,221,208,0.45);
            margin-top: 2px;
        }

        /* ── 카드 설명 ── */
        .card-desc {
            font-size: 0.93rem;
            line-height: 1.7;
            color: rgba(232,221,208,0.72);
            margin-bottom: 20px;
        }

        /* ── 기능 태그 ── */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 22px;
        }

        .tag {
            font-size: 0.76rem;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(251,191,36,0.1);
            color: #fcd34d;
            border: 1px solid rgba(251,191,36,0.16);
            letter-spacing: 0.2px;
        }

        /* ── 버튼 ── */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            letter-spacing: 0.2px;
        }

        .btn-primary {
            background: rgba(251,191,36,0.18);
            color: #fcd34d;
            border: 1px solid rgba(251,191,36,0.25);
        }

        .btn-primary:hover {
            background: rgba(251,191,36,0.28);
            border-color: rgba(251,191,36,0.45);
            color: #fde68a;
        }

        .btn-outline {
            background: transparent;
            color: rgba(232,221,208,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            color: rgba(232,221,208,0.8);
            border-color: rgba(255,255,255,0.22);
        }

        /* ── 더 추가될 영역 ── */
        .placeholder-card {
            background: rgba(255,255,255,0.025);
            border: 2px dashed rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 42px 34px;
            text-align: center;
            color: rgba(245,237,216,0.25);
            font-size: 0.95rem;
            letter-spacing: 0.4px;
        }

        .placeholder-card .plus {
            font-size: 2rem;
            font-weight: 300;
            display: block;
            margin-bottom: 6px;
            color: rgba(245,237,216,0.15);
        }

        /* ── 모바일 ── */
        @media (max-width: 600px) {
            body { padding: 36px 14px 56px; }
            .header h1 { font-size: 1.6rem; }
            .site-card { padding: 28px 20px 24px; }
            .card-name { font-size: 1.15rem; }
            .btn { padding: 9px 16px; font-size: 0.82rem; }
        }
    </style>
</head>
<body>

    <a class="back-to-main" href="index.html">← 메인으로 돌아가기</a>

    <div class="header">
        <h1>🔧 업무 자동화</h1>
        <p class="subtitle">반복되는 학교 업무를 자동화하는 도구들</p>
    </div>

    <div class="site-list">

        <!-- ====== 학교행정업무도우미 ====== -->
        <a class="site-card" href="https://school-admin-helper.vercel.app" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
            <div class="card-top">
                <div class="card-icon amber">🏫</div>
                <div>
                    <div class="card-name">학교행정업무도우미</div>
                    <div class="card-tagline">기안·계획서, 검색 한 번으로 해결</div>
                </div>
            </div>
        </a>

        <!-- ====== 추가 도구 자리 ====== -->
        <div class="placeholder-card">
            <span class="plus">+</span>
            앞으로 추가될 업무 자동화 도구가 여기에 들어갑니다
        </div>

    </div>

</body>
</html>
