<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대수 - 수학 교사는 심심했다</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            padding: 40px 20px;
        }
        .back {
            position: fixed;
            top: 24px;
            left: 24px;
            color: rgba(255,255,255,0.35);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
            z-index: 10;
        }
        .back:hover { color: rgba(255,255,255,0.7); }
        h1 {
            color: #fff;
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }
        .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
            margin-bottom: 48px;
            text-align: center;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 400px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 20px 28px;
            border-radius: 10px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f4f4f4;
            font-size: 1.15rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.25s ease;
            cursor: pointer;
            user-select: none;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.13);
            border-color: rgba(255,255,255,0.25);
        }
        .btn:active {
            transform: translateY(-1px);
        }
        .chapter-num {
            display: inline-block;
            margin-right: 10px;
            opacity: 0.5;
            font-weight: 400;
        }

        /* Toggle button (수열) */
        .toggle-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px 28px;
            border-radius: 10px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f4f4f4;
            font-size: 1.15rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
            letter-spacing: 0.3px;
            transition: all 0.25s ease;
            font-family: inherit;
        }
        .toggle-btn:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.13);
            border-color: rgba(255,255,255,0.25);
        }
        .toggle-btn .arrow {
            position: absolute;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s ease;
            font-size: 0.9rem;
            opacity: 0.5;
        }
        .toggle-btn .arrow.open {
            transform: translateY(-50%) rotate(180deg);
        }

        /* Sub-items container */
        .sub-items {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.35s ease;
            width: 100%;
        }
        .sub-items.open {
            grid-template-rows: 1fr;
        }
        .sub-items-inner {
            overflow: hidden;
        }
        .sub-btn {
            display: block;
            width: 100%;
            padding: 14px 24px 14px 48px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.75);
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
            margin-bottom: 8px;
        }
        .sub-btn:last-child {
            margin-bottom: 0;
        }
        .sub-btn:hover {
            background: rgba(255,255,255,0.09);
            color: #f4f4f4;
            transform: translateX(4px);
        }
        .sub-btn .bullet {
            display: inline-block;
            margin-right: 10px;
            opacity: 0.4;
            font-weight: 400;
        }

        .footer {
            margin-top: 56px;
            color: rgba(255,255,255,0.12);
            font-size: 0.75rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <a class="back" href="../">← 뒤로</a>

    <h1>📗 대수</h1>
    <p class="subtitle">대단원을 선택하세요</p>

    <div class="buttons">
        <a class="btn" href="지수함수와 로그함수/">
            <span class="chapter-num">Ⅰ.</span> 지수함수와 로그함수
        </a>
        <a class="btn" href="삼각함수/">
            <span class="chapter-num">Ⅱ.</span> 삼각함수
        </a>

        <!-- 수열: toggle -->
        <button class="toggle-btn" onclick="toggleSub()">
            <span><span class="chapter-num">Ⅲ.</span> 수열</span>
            <span class="arrow" id="arrow">▼</span>
        </button>
        <div class="sub-items" id="subItems">
            <div class="sub-items-inner">
                <a class="sub-btn" href="#">
                    <span class="bullet">·</span> 등차수열
                </a>
                <a class="sub-btn" href="#">
                    <span class="bullet">·</span> 등비수열
                </a>
                <a class="sub-btn" href="#">
                    <span class="bullet">·</span> 여러 가지 수열의 합
                </a>
                <a class="sub-btn" href="수열/수학적귀납법.html">
                    <span class="bullet">·</span> 수학적 귀납법
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleSub() {
            const items = document.getElementById('subItems');
            const arrow = document.getElementById('arrow');
            items.classList.toggle('open');
            arrow.classList.toggle('open');
        }
    </script>

    <div class="footer">since 2026</div>
</body>
</html>
