<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            padding: 40px 20px;
        }
        .back {
            position: absolute;
            top: 24px;
            left: 24px;
            color: rgba(255,255,255,0.35);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .back:hover {
            color: rgba(255,255,255,0.7);
        }
        h1 {
            color: #fff;
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 36px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 320px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px 24px;
            border-radius: 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            user-select: none;
        }
        .btn:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.13);
            border-color: rgba(255,255,255,0.25);
        }
        .btn:active {
            transform: translateY(-1px);
        }
        .footer {
            margin-top: 56px;
            color: rgba(255,255,255,0.12);
            font-size: 0.75rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <a class="back" href="index.html">← 수학 교사는 심심했다</a>

    <h1>📊 수학</h1>

    <div class="buttons">
        <a class="btn" href="#">
            <span class="icon">📈</span> 지수함수와 로그함수
        </a>

        <a class="btn" href="#">
            <span class="icon">🔢</span> 수열
        </a>
    </div>

    <div class="footer">© 2026 수학 교사</div>
</body>
</html>
