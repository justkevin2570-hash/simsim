<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #2d4a3e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            padding: 40px 20px;
        }
        .chalkboard {
            background: linear-gradient(180deg, #2a4a3a 0%, #1e3828 100%);
            border: 8px solid #5c3d2e;
            border-radius: 8px;
            box-shadow:
                inset 0 0 60px rgba(0,0,0,0.3),
                0 8px 32px rgba(0,0,0,0.5),
                0 0 0 3px #3d2616;
            padding: 64px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 480px;
            width: 100%;
            position: relative;
        }
        .back {
            position: absolute;
            top: 20px;
            left: 24px;
            color: rgba(245,240,232,0.35);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back:hover {
            color: rgba(245,240,232,0.7);
        }
        h1 {
            color: #f5f0e8;
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: -0.5px;
            margin-top: 20px;
            margin-bottom: 36px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }
        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            border-radius: 4px;
            background: transparent;
            border: 2px dashed rgba(245,240,232,0.25);
            color: rgba(245,240,232,0.9);
            font-size: 1.05rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
            letter-spacing: -0.3px;
        }
        .btn:hover {
            border-style: solid;
            border-color: rgba(245,240,232,0.6);
            background: rgba(255,255,255,0.04);
            color: #f5f0e8;
        }
        .btn:active {
            transform: translateY(1px);
        }
        .footer {
            margin-top: 48px;
            color: rgba(245,240,232,0.15);
            font-size: 0.7rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="chalkboard">
        <a class="back" href="index.html">← 수학 교사는 심심했다</a>

        <h1>📊 수학</h1>

        <div class="buttons">
            <a class="btn" href="#">
                📈 지수함수와 로그함수
            </a>

            <a class="btn" href="#">
                🔢 수열
            </a>
        </div>

        <div class="footer">© 2026 수학 교사</div>
    </div>
</body>
</html>
