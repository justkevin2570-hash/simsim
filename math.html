<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #f8f6f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            padding: 40px 20px;
        }
        .chalkboard-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .chalkboard {
            background: linear-gradient(180deg, #2a4a3a 0%, #1e3828 100%);
            border: 10px solid #5c3d2e;
            border-radius: 6px;
            box-shadow:
                inset 0 0 80px rgba(0,0,0,0.3),
                0 12px 40px rgba(0,0,0,0.4),
                0 0 0 4px #3d2616;
            padding: 84px 108px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 1080px;
            max-width: 95vw;
            position: relative;
        }
        .back {
            position: absolute;
            top: 24px;
            left: 28px;
            color: rgba(245,240,232,0.35);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
            z-index: 2;
        }
        .back:hover {
            color: rgba(245,240,232,0.7);
        }
        .chalkboard-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            width: 100%;
            margin-top: 12px;
        }
        h1 {
            color: #f5f0e8;
            font-size: 2.6rem;
            text-align: center;
            letter-spacing: -0.5px;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }
        .buttons {
            display: flex;
            gap: 20px;
            width: 100%;
        }
        .btn-wrap {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-wrap svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .btn {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 18px 24px;
            color: rgba(245,240,232,0.9);
            font-size: 1.15rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
            letter-spacing: -0.3px;
            white-space: nowrap;
            transition: opacity 0.2s;
            background: transparent;
            border: none;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .footer {
            margin-top: 40px;
            color: rgba(0,0,0,0.15);
            font-size: 0.7rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="chalkboard-wrapper">
        <div class="chalkboard">
            <a class="back" href="index.html">← 수학 교사는 심심했다</a>

            <div class="chalkboard-content">
                <h1>📊 수학</h1>

                <div class="buttons">
                    <!-- 지수함수와 로그함수 - red chalk circle -->
                    <div class="btn-wrap">
                        <svg width="280" height="70" viewBox="0 0 280 70">
                            <ellipse cx="140" cy="35" rx="136" ry="31"
                                fill="none" stroke="#e07060" stroke-width="2.5"
                                stroke-dasharray="7 3"
                                stroke-linecap="round"
                                opacity="0.8"
                                transform="rotate(-1.5, 140, 35)" />
                            <ellipse cx="140" cy="35" rx="133" ry="28"
                                fill="none" stroke="#e07060" stroke-width="1"
                                stroke-dasharray="4 5"
                                stroke-linecap="round"
                                opacity="0.4"
                                transform="rotate(2, 140, 35)" />
                        </svg>
                        <a class="btn" href="#">
                            📈 지수함수와 로그함수
                        </a>
                    </div>

                    <!-- 수열 - yellow chalk circle -->
                    <div class="btn-wrap">
                        <svg width="280" height="70" viewBox="0 0 280 70">
                            <ellipse cx="140" cy="35" rx="136" ry="31"
                                fill="none" stroke="#e8c840" stroke-width="2.5"
                                stroke-dasharray="8 4"
                                stroke-linecap="round"
                                opacity="0.8"
                                transform="rotate(1, 140, 35)" />
                            <ellipse cx="140" cy="35" rx="133" ry="28"
                                fill="none" stroke="#e8c840" stroke-width="1"
                                stroke-dasharray="3 6"
                                stroke-linecap="round"
                                opacity="0.4"
                                transform="rotate(-2, 140, 35)" />
                        </svg>
                        <a class="btn" href="#">
                            🔢 수열
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">© 2026 수학 교사</div>
</body>
</html>
