<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 교사는 심심했다</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #2d4a3e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            padding: 40px 20px;
        }
        .chalkboard {
            background: linear-gradient(180deg, #2a4a3a 0%, #1e3828 100%);
            border: 8px solid #5c3d2e;
            border-radius: 8px;
            box-shadow:
                inset 0 0 60px rgba(0,0,0,0.3),
                0 8px 32px rgba(0,0,0,0.5),
                0 0 0 3px #3d2616;
            padding: 64px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 480px;
            width: 100%;
        }
        h1 {
            color: #f5f0e8;
            font-size: 2.2rem;
            text-align: center;
            letter-spacing: -0.5px;
            line-height: 1.3;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }
        .subtitle {
            color: rgba(245,240,232,0.5);
            font-size: 0.9rem;
            margin-top: 6px;
            margin-bottom: 48px;
            text-align: center;
            font-style: italic;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            border-radius: 4px;
            background: transparent;
            border: 2px dashed rgba(245,240,232,0.25);
            color: rgba(245,240,232,0.9);
            font-size: 1.05rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
            letter-spacing: -0.3px;
        }
        .btn:hover {
            border-style: solid;
            border-color: rgba(245,240,232,0.6);
            background: rgba(255,255,255,0.04);
            color: #f5f0e8;
        }
        .btn:active {
            transform: translateY(1px);
        }
        .btn.disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }
        .btn.disabled:hover {
            border-style: dashed;
            border-color: rgba(245,240,232,0.25);
            background: transparent;
            color: rgba(245,240,232,0.9);
        }
        .footer {
            margin-top: 48px;
            color: rgba(245,240,232,0.15);
            font-size: 0.7rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="chalkboard">
        <h1>📐 수학 교사는 심심했다.</h1>
        <p class="subtitle">Math Teacher was Bored</p>

        <div class="buttons">
            <a class="btn" href="https://auto-tesk.vercel.app/" target="_blank" rel="noopener noreferrer">
                🔧 업무 자동화
            </a>

            <a class="btn" href="math.html">
                📊 수학
            </a>

            <span class="btn disabled">
                👥 동료교사 사이트
            </span>
        </div>

        <div class="footer">© 2026 수학 교사</div>
    </div>
</body>
</html>
