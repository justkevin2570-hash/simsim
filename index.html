<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 교사는 심심했다</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #f8f6f0;
            background-image:
                radial-gradient(ellipse at 25% 30%, rgba(180,160,140,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(180,160,140,0.12) 0%, transparent 55%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            padding: 40px 20px;
        }

        /* ── 칠판 ── */
        .chalkboard {
            position: relative;
            width: 100%;
            max-width: 620px;
            background: linear-gradient(178deg, #2d4f3e 0%, #244535 30%, #1e3828 100%);
            border: 12px solid #5c3d2e;
            border-radius: 5px;
            box-shadow:
                inset 0 0 100px rgba(0,0,0,0.25),
                inset 0 2px 6px rgba(0,0,0,0.15),
                0 16px 48px rgba(0,0,0,0.45),
                0 0 0 4px #3d2616;
            padding: 56px 32px 48px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 칠판 지우개 자국 — 희미한 가로 얼룩 */
        .chalkboard::before {
            content: '';
            position: absolute;
            inset: 20% 6% 25% 8%;
            background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.025) 0%, transparent 70%),
                        radial-gradient(ellipse at 70% 55%, rgba(255,255,255,0.018) 0%, transparent 65%);
            border-radius: 4px;
            pointer-events: none;
        }

        /* ── 분필 받침대 ── */
        .chalk-tray {
            width: calc(100% + 32px);
            max-width: 652px;
            height: 12px;
            background: linear-gradient(180deg, #6b4530 0%, #523222 40%, #3d2214 100%);
            border-radius: 0 0 4px 4px;
            box-shadow:
                0 6px 14px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.06);
            position: relative;
            z-index: 1;
        }

        /* ── 타이포그래피 ── */
        h1 {
            color: #f5f0e8;
            font-size: clamp(1.5rem, 4vw, 2.3rem);
            text-align: center;
            font-weight: 500;
            letter-spacing: -0.3px;
            line-height: 1.35;
            filter: url(#chalk-text);
            text-shadow:
                0 0 1.5px rgba(255,255,255,0.55),
                0 0 5px rgba(255,255,255,0.12);
        }

        .subtitle {
            color: rgba(245,240,232,0.42);
            font-size: 0.82rem;
            margin-top: 6px;
            margin-bottom: 48px;
            text-align: center;
            filter: url(#chalk-text);
            letter-spacing: 0.3px;
        }

        /* ── 메뉴 ── */
        .menu {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            flex-wrap: wrap;
        }

        .chalk-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
            padding: 40px 0 10px;
            transition: transform 0.2s ease;
            flex: 0 0 auto;
        }

        .chalk-btn:hover:not(.disabled) {
            transform: scale(1.05);
        }

        .chalk-btn:active:not(.disabled) {
            transform: scale(0.97);
        }

        .chalk-btn .circle-svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .chalk-btn .label {
            position: relative;
            z-index: 1;
            color: #f5f0e8;
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 0.4px;
            filter: url(#chalk-text);
            text-shadow:
                0 0 1px rgba(255,255,255,0.5),
                0 0 4px rgba(255,255,255,0.1);
            padding: 3px 18px;
        }

        .chalk-btn.disabled {
            opacity: 0.25;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ── 칠판 아래 분필 가루 ── */
        .chalk-dust {
            position: absolute;
            bottom: 10px;
            left: 12%;
            right: 12%;
            height: 3px;
            background: rgba(245,240,232,0.07);
            border-radius: 50%;
            filter: blur(3px);
            pointer-events: none;
        }

        /* ── 푸터 ── */
        .footer {
            margin-top: 28px;
            color: rgba(0,0,0,0.16);
            font-size: 0.7rem;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* ── 모바일 미세조정 ── */
        @media (max-width: 560px) {
            .chalkboard {
                padding: 34px 16px 30px;
                border-width: 8px;
                box-shadow:
                    inset 0 0 50px rgba(0,0,0,0.25),
                    0 8px 28px rgba(0,0,0,0.4),
                    0 0 0 3px #3d2616;
            }
            .chalk-tray {
                width: calc(100% + 20px);
                height: 9px;
            }
            .menu {
                flex-direction: column;
                gap: 10px;
            }
            .chalk-btn {
                padding: 5px 0;
            }
            .chalk-btn .label {
                font-size: 1.05rem;
                padding: 2px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- 분필 질감 SVG 필터 -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <!-- 분필 선(원)용 -->
            <filter id="chalk-stroke" x="-20%" y="-20%" width="140%" height="140%">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"/>
                <feComponentTransfer>
                    <feFuncA type="linear" slope="0.92"/>
                </feComponentTransfer>
            </filter>
            <!-- 분필 텍스트용 (한글 가독성 유지) -->
            <filter id="chalk-text" x="-10%" y="-10%" width="120%" height="120%">
                <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="3" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8"/>
            </filter>
        </defs>
    </svg>

    <!-- 칠판 -->
    <div class="chalkboard">
        <h1>📐 수학 교사는 심심했다.</h1>
        <p class="subtitle">Math Teacher was Bored</p>

        <div class="menu">
            <!-- 업무 자동화 — 노란 분필 -->
            <a class="chalk-btn" href="https://auto-tesk.vercel.app/" target="_blank" rel="noopener noreferrer">
                <svg class="circle-svg" width="170" height="52" viewBox="0 0 170 52">
                    <ellipse cx="85" cy="26" rx="81" ry="22" fill="none"
                        stroke="#e8c840" stroke-width="2.2"
                        stroke-linecap="round" opacity="0.82"
                        filter="url(#chalk-stroke)" transform="rotate(-1.6, 85, 26)"/>
                    <ellipse cx="85" cy="26" rx="77" ry="18" fill="none"
                        stroke="#e8c840" stroke-width="0.7"
                        stroke-linecap="round" opacity="0.3"
                        filter="url(#chalk-stroke)" transform="rotate(2.1, 85, 26)"/>
                </svg>
                <span class="label">업무 자동화</span>
            </a>

            <!-- 수학 — 파란 분필 -->
            <a class="chalk-btn" href="Math/select.html">
                <svg class="circle-svg" width="170" height="52" viewBox="0 0 170 52">
                    <ellipse cx="85" cy="26" rx="81" ry="22" fill="none"
                        stroke="#6098d0" stroke-width="2.2"
                        stroke-linecap="round" opacity="0.82"
                        filter="url(#chalk-stroke)" transform="rotate(1.4, 85, 26)"/>
                    <ellipse cx="85" cy="26" rx="77" ry="18" fill="none"
                        stroke="#6098d0" stroke-width="0.7"
                        stroke-linecap="round" opacity="0.3"
                        filter="url(#chalk-stroke)" transform="rotate(-1.9, 85, 26)"/>
                </svg>
                <span class="label">수학</span>
            </a>

            <!-- 동료교사 사이트 — 붉은 분필 (disabled) -->
            <span class="chalk-btn disabled">
                <svg class="circle-svg" width="170" height="52" viewBox="0 0 170 52">
                    <ellipse cx="85" cy="26" rx="81" ry="22" fill="none"
                        stroke="#e07060" stroke-width="2.2"
                        stroke-linecap="round" opacity="0.82"
                        filter="url(#chalk-stroke)" transform="rotate(-2.1, 85, 26)"/>
                    <ellipse cx="85" cy="26" rx="77" ry="18" fill="none"
                        stroke="#e07060" stroke-width="0.7"
                        stroke-linecap="round" opacity="0.3"
                        filter="url(#chalk-stroke)" transform="rotate(1.1, 85, 26)"/>
                </svg>
                <span class="label">동료교사 사이트</span>
            </span>
        </div>

        <div class="chalk-dust"></div>
    </div>

    <!-- 분필 받침대 -->
    <div class="chalk-tray"></div>

    <p class="footer">since 2026</p>

</body>
</html>
