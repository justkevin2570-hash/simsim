<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 교사는 심심했다</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            padding: 40px 20px;
        }
        h1 {
            color: #fff;
            font-size: 2.5rem;
            text-align: center;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }
        .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
            margin-top: 6px;
            margin-bottom: 48px;
            text-align: center;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 320px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            border-radius: 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            color: #f4f4f4;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            user-select: none;
        }
        .btn .icon {
            width: 26px;
            height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .btn:hover:not(.disabled) {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.13);
            border-color: rgba(255,255,255,0.25);
        }
        .btn:active:not(.disabled) {
            transform: translateY(-1px);
        }
        .btn.disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }
        .footer {
            margin-top: 56px;
            color: rgba(255,255,255,0.12);
            font-size: 0.75rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>📐 수학 교사는 심심했다.</h1>
    <p class="subtitle">Math Teacher was Bored</p>

    <div class="buttons">
        <a class="btn" href="https://auto-tesk.vercel.app/" target="_blank" rel="noopener noreferrer">
            <span class="icon">
                <svg viewBox="0 0 26 26" width="26" height="26">
                    <circle cx="13" cy="13" r="9" fill="none"
                            stroke="#ffd84d" stroke-width="3.2" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="label">업무 자동화</span>
        </a>

        <a class="btn" href="select.html">
            <span class="icon">
                <svg viewBox="0 0 26 26" width="26" height="26">
                    <circle cx="13" cy="13" r="9" fill="none"
                            stroke="#5ab9ff" stroke-width="3.2" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="label">수학</span>
        </a>

        <span class="btn disabled">
            <span class="icon">
                <svg viewBox="0 0 26 26" width="26" height="26">
                    <circle cx="13" cy="13" r="9" fill="none"
                            stroke="#ff8fb8" stroke-width="3.2" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="label">동료교사 사이트</span>
        </span>
    </div>

    <div class="footer">since 2026</div>
</body>
</html>
