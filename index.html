<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 교사는 심심했다</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #f8f6f0;
            background-image:
                radial-gradient(ellipse at 25% 30%, rgba(180,160,140,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(180,160,140,0.12) 0%, transparent 55%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
            padding: 80px 40px;
        }

        /* ── 칠판 ── */
        .chalkboard {
            position: relative;
            width: 100%;
            max-width: 1240px;
            background: linear-gradient(178deg, #2d4f3e 0%, #244535 30%, #1e3828 100%);
            border: 24px solid #5c3d2e;
            border-radius: 10px;
            box-shadow:
                inset 0 0 200px rgba(0,0,0,0.25),
                inset 0 4px 12px rgba(0,0,0,0.15),
                0 32px 96px rgba(0,0,0,0.45),
                0 0 0 8px #3d2616;
            padding: 168px 64px 144px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 칠판 지우개 자국 — 희미한 가로 얼룩 */
        .chalkboard::before {
            content: '';
            position: absolute;
            inset: 20% 6% 25% 8%;
            background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.025) 0%, transparent 70%),
                        radial-gradient(ellipse at 70% 55%, rgba(255,255,255,0.018) 0%, transparent 65%);
            border-radius: 8px;
            pointer-events: none;
        }

        /* ── 분필 받침대 ── */
        .chalk-tray {
            width: calc(100% + 64px);
            max-width: 1304px;
            height: 24px;
            background: linear-gradient(180deg, #6b4530 0%, #523222 40%, #3d2214 100%);
            border-radius: 0 0 8px 8px;
            box-shadow:
                0 12px 28px rgba(0,0,0,0.35),
                inset 0 2px 0 rgba(255,255,255,0.06);
            position: relative;
            z-index: 1;
        }

        /* ── 타이포그래피 ── */
        h1 {
            color: #f5f0e8;
            font-size: clamp(3rem, 8vw, 4.6rem);
            text-align: center;
            font-weight: 500;
            letter-spacing: -0.6px;
            line-height: 1.35;
            filter: url(#chalk-text);
            text-shadow:
                0 0 3px rgba(255,255,255,0.55),
                0 0 10px rgba(255,255,255,0.12);
        }

        .subtitle {
            color: rgba(245,240,232,0.42);
            font-size: 1.64rem;
            margin-top: 12px;
            margin-bottom: 128px;
            text-align: center;
            filter: url(#chalk-text);
            letter-spacing: 0.6px;
        }

        /* ── 메뉴 ── */
        .menu {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            flex-wrap: wrap;
        }

        .chalk-btn {
            position: relative;
            display: inline-grid;
            place-items: center;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
            padding: 0;
            transition: transform 0.2s ease;
            flex: 0 0 auto;
        }

        .chalk-btn:hover:not(.disabled) {
            transform: scale(1.05);
        }

        .chalk-btn:active:not(.disabled) {
            transform: scale(0.97);
        }

        .chalk-btn .circle-svg {
            grid-area: 1 / 1;
            pointer-events: none;
        }

        .chalk-btn .label {
            grid-area: 1 / 1;
            color: #f5f0e8;
            font-size: 2.3rem;
            font-weight: 500;
            letter-spacing: 0.8px;
            filter: url(#chalk-text);
            text-shadow:
                0 0 2px rgba(255,255,255,0.5),
                0 0 8px rgba(255,255,255,0.1);
            padding: 6px 36px;
        }

        .chalk-btn.disabled {
            opacity: 0.25;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ── 칠판 아래 분필 가루 ── */
        .chalk-dust {
            position: absolute;
            bottom: 20px;
            left: 12%;
            right: 12%;
            height: 6px;
            background: rgba(245,240,232,0.07);
            border-radius: 50%;
            filter: blur(6px);
            pointer-events: none;
        }

        /* ── 푸터 ── */
        .footer {
            margin-top: 56px;
            color: rgba(0,0,0,0.16);
            font-size: 1.4rem;
            text-align: center;
            letter-spacing: 1px;
        }

        /* ── 모바일 ── */
        @media (max-width: 900px) {
            body { padding: 20px 12px; }
            .chalkboard {
                padding: 48px 20px 40px;
                border-width: 12px;
                box-shadow:
                    inset 0 0 60px rgba(0,0,0,0.25),
                    0 12px 32px rgba(0,0,0,0.4),
                    0 0 0 4px #3d2616;
            }
            .chalk-tray {
                width: calc(100% + 28px);
                height: 14px;
            }
            h1 { font-size: clamp(1.8rem, 7vw, 2.6rem); }
            .subtitle { font-size: 1rem; margin-bottom: 48px; }
            .menu {
                flex-direction: column;
                gap: 18px;
            }
            .chalk-btn .label {
                font-size: 1.4rem;
                padding: 4px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- 분필 질감 SVG 필터 -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <!-- 분필 선(원)용 -->
            <filter id="chalk-stroke" x="-20%" y="-20%" width="140%" height="140%">
                <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2"/>
                <feComponentTransfer>
                    <feFuncA type="linear" slope="0.92"/>
                </feComponentTransfer>
            </filter>
            <!-- 분필 텍스트용 (한글 가독성 유지) -->
            <filter id="chalk-text" x="-10%" y="-10%" width="120%" height="120%">
                <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="3" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8"/>
            </filter>
        </defs>
    </svg>

    <!-- 칠판 -->
    <div class="chalkboard">
        <h1>📐 수학 교사는 심심했다.</h1>
        <p class="subtitle">Math Teacher was Bored</p>

        <div class="menu">
            <!-- 업무 자동화 — 노란 분필 -->
            <a class="chalk-btn" href="https://auto-tesk.vercel.app/" target="_blank" rel="noopener noreferrer">
                <svg class="circle-svg" width="340" height="104" viewBox="0 0 340 104">
                    <ellipse cx="170" cy="52" rx="162" ry="44" fill="none"
                        stroke="#e8c840" stroke-width="4.4"
                        stroke-linecap="round" opacity="0.82"
                        filter="url(#chalk-stroke)" transform="rotate(-1.6, 170, 52)"/>
                    <ellipse cx="170" cy="52" rx="154" ry="36" fill="none"
                        stroke="#e8c840" stroke-width="1.4"
                        stroke-linecap="round" opacity="0.3"
                        filter="url(#chalk-stroke)" transform="rotate(2.1, 170, 52)"/>
                </svg>
                <span class="label">업무 자동화</span>
            </a>

            <!-- 수학 — 파란 분필 -->
            <a class="chalk-btn" href="Math/select.html">
                <svg class="circle-svg" width="340" height="104" viewBox="0 0 340 104">
                    <ellipse cx="170" cy="52" rx="162" ry="44" fill="none"
                        stroke="#6098d0" stroke-width="4.4"
                        stroke-linecap="round" opacity="0.82"
                        filter="url(#chalk-stroke)" transform="rotate(1.4, 170, 52)"/>
                    <ellipse cx="170" cy="52" rx="154" ry="36" fill="none"
                        stroke="#6098d0" stroke-width="1.4"
                        stroke-linecap="round" opacity="0.3"
                        filter="url(#chalk-stroke)" transform="rotate(-1.9, 170, 52)"/>
                </svg>
                <span class="label">수학</span>
            </a>

            <!-- 동료교사 사이트 — 붉은 분필 (disabled) -->
            <span class="chalk-btn disabled">
                <svg class="circle-svg" width="340" height="104" viewBox="0 0 340 104">
                    <ellipse cx="170" cy="52" rx="162" ry="44" fill="none"
                        stroke="#e07060" stroke-width="4.4"
                        stroke-linecap="round" opacity="0.82"
                        filter="url(#chalk-stroke)" transform="rotate(-2.1, 170, 52)"/>
                    <ellipse cx="170" cy="52" rx="154" ry="36" fill="none"
                        stroke="#e07060" stroke-width="1.4"
                        stroke-linecap="round" opacity="0.3"
                        filter="url(#chalk-stroke)" transform="rotate(1.1, 170, 52)"/>
                </svg>
                <span class="label">동료교사 사이트</span>
            </span>
        </div>

        <div class="chalk-dust"></div>
    </div>

    <!-- 분필 받침대 -->
    <div class="chalk-tray"></div>

    <p class="footer">since 2026</p>

</body>
</html>
